<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Samyang Lovers Webring</title>
  <style>html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:monospace;
}

.webring{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    box-sizing:border-box;
    padding:8px;
}

.viewer{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    gap:8px;
}

.site-thumb{
    width:min(90px,50vw);
    aspect-ratio:1;

    background-size:cover;
    background-position:center;

    border:2px solid #000;

    transform:rotate(-4deg);

    image-rendering:pixelated;

    display:block;
}

.arrow{
    width:24px;
    height:24px;

    border:none;
    cursor:pointer;

    background:transparent;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
}

#prev{
    background-image:url("assets/arrow-left.png");
}

#next{
    background-image:url("assets/arrow-right.png");
}

.random{
    margin-top:8px;
    background:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    text-decoration:underline;
}

.title{
    margin-top:6px;
    text-align:center;
}

.about{
    margin-top:4px;
    color:inherit;
    font-size:12px;
}</style>
  </head>
<body>
  <div class="webring">

    <div class="viewer">

        <button id="prev" class="arrow"></button>

        <a id="siteLink"
           class="site-thumb"
           href="#"
           target="_blank">
        </a>

        <button id="next" class="arrow"></button>

    </div>

    <button id="randomBtn" class="random">
        [ random ]
    </button>

    <div class="title">
        Samyang Lvrs Webring
    </div>

    <a
       href="https://itsdida.neocities.org/webring"
       class="about"
       target="_blank">
       what is this?
    </a>

</div>
  <script>let members = [];
let current = 0;

fetch("members.json")
.then(r => r.json())
.then(data => {

    members = data;

    randomSite();

    setInterval(() => {
        randomSite();
    },30000);
});

function render() {

    const member = members[current];

    const link =
        document.getElementById("siteLink");

    link.href = member.url;

    link.style.backgroundImage =
        `url('${member.image}')`;
}

function randomSite() {

    current =
        Math.floor(
            Math.random() * members.length
        );

    render();
}

document
.getElementById("randomBtn")
.addEventListener("click", randomSite);

document
.getElementById("prev")
.addEventListener("click", () => {

    current--;

    if(current < 0)
        current = members.length - 1;

    render();
});

document
.getElementById("next")
.addEventListener("click", () => {

    current++;

    if(current >= members.length)
        current = 0;

    render();
});</script>
  </body>
</html>
