<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Samyang Lovers Webring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
  <style>html,body{margin:0;padding:0;width:100%;height:100%;font-family: "Schoolbell", cursive;}.webring{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box;padding:8px;}.viewer{display:flex;align-items:center;justify-content:center;width:100%;gap:8px;}.site-thumb{width:min(90px,50vw);aspect-ratio:1;background-size:cover;background-position:center;transform:rotate(-4deg);image-rendering:pixelated;display:block;}.arrow{width:24px;height:24px;border:none;cursor:pointer;background:transparent;background-size:contain;background-repeat:no-repeat;background-position:center;}#prev{background-image:url("assets/arrows/arrow-previous.png");}#next{background-image:url("assets/arrows/arrow-next.png");}.random{margin-top:8px;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;}.title{margin-top:6px;text-align:center;}.about{margin-top:4px;color:inherit;font-size:12px;}</style>
  </head>
<body>
  <div class="webring">

    <div class="viewer">

        <button id="prev" class="arrow"></button>

        <a id="siteLink"
           class="site-thumb"
           href="#"
           target="_blank">
        </a>

        <button id="next" class="arrow"></button>

    </div>

    <button id="randomBtn" class="random">
        [ random ]
    </button>

    <div class="title">
        Samyang Lvrs Webring
    </div>

    <a
       href="https://itsdida.neocities.org/webring.html"
       class="about"
       target="_blank">
       what is this?
    </a>

</div>
  <script>
    const params = new URLSearchParams(window.location.search);
const currentSiteId = params.get("site");
let currentMember;

fetch("members.json")
  .then(r => r.json())
  .then(data => {

    members = data;

    currentMember =
      members.find(
        m => m.id === currentSiteId
      );

    renderCurrentSite();
  });

function renderCurrentSite() {

  const link =
    document.getElementById("siteLink");

  link.href = currentMember.url;

  link.style.backgroundImage =
    `url('assets/flavors/${currentMember.flavor}.png')`;
}

function getRandomMember() {

  let candidates =
    members.filter(
      m => m.id !== currentMember.id
    );

  return candidates[
    Math.floor(
      Math.random() * candidates.length
    )
  ];
}

document
.getElementById("prev")
.addEventListener("click", () => {

  const target =
    getRandomMember();

  window.open(
    target.url,
    "_blank"
  );
});

document
.getElementById("next")
.addEventListener("click", () => {

  const target =
    getRandomMember();

  window.open(
    target.url,
    "_blank"
  );
});
  document
.getElementById("randomBtn")
.addEventListener("click", () => {

  const target =
    getRandomMember();

  window.open(
    target.url,
    "_blank"
  );
});
  </script>
  </body>
</html>
